<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 310" role="img" aria-label="Patrick Ray Rank - Engenheiro de Dados">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#141a22"/>
      <stop offset="1" stop-color="#0b0e13"/>
    </linearGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#8b949e" fill-opacity="0.07"/>
    </pattern>
  </defs>

  <!-- panel -->
  <rect width="1200" height="310" fill="url(#bg)"/>
  <rect width="1200" height="310" fill="url(#dots)"/>

  <!-- corner ticks -->
  <g fill="none" stroke="#3a424d" stroke-width="2.5" stroke-linecap="square">
    <path d="M22,44 L22,22 L44,22"/>
    <path d="M1156,22 L1178,22 L1178,44"/>
    <path d="M22,266 L22,288 L44,288"/>
    <path d="M1156,288 L1178,288 L1178,266"/>
  </g>

  <!-- name -->
  <text x="600" y="124" text-anchor="middle"
        font-family="'Segoe UI', Verdana, Arial, sans-serif"
        font-size="62" font-weight="700" letter-spacing="7" fill="#e6edf3">PATRICK RAY RANK</text>

  <!-- divider -->
  <line x1="528" y1="156" x2="672" y2="156" stroke="#30363d" stroke-width="2"/>
  <rect x="-4" y="-4" width="8" height="8" fill="#484f58" transform="translate(528,156) rotate(45)"/>
  <rect x="-4" y="-4" width="8" height="8" fill="#484f58" transform="translate(672,156) rotate(45)"/>

  <!-- role -->
  <text x="600" y="206" text-anchor="middle"
        font-family="'Segoe UI', Verdana, Arial, sans-serif"
        font-size="23" font-weight="600" letter-spacing="12" fill="#8b949e">ENGENHEIRO DE DADOS</text>

  <!-- location -->
  <text x="600" y="252" text-anchor="middle"
        font-family="'Cascadia Mono', Consolas, monospace"
        font-size="14" letter-spacing="4" fill="#6e7681">CURITIBA &#183; PR &#183; BRASIL</text>
</svg>
